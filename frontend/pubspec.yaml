name: pothole_vision
description: "PotholeVision - AI-based pothole detection and reporting"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4

  # State Management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.7.0

  # Image Picker
  image_picker: ^1.1.2

  # Google Maps
  google_maps_flutter: ^2.10.0

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^27.2.5

  # Image Compression
  flutter_image_compress: ^2.3.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Networking Image Cache
  cached_network_image: ^3.4.1

  # Google Fonts
  google_fonts: ^6.2.1

  # Date Formatting
  intl: ^0.19.0

  # Path provider (for temp file access)
  path_provider: ^2.1.5
  camera: ^0.12.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
